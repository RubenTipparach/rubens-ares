<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ares - N64 Emulator</title>
  <script src="coi-serviceworker.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      padding: 16px 24px;
      text-align: center;
      width: 100%;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 2px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    #canvas-container {
      margin-top: 24px;
      border: 3px solid #0f3460;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.15);
    }

    canvas#canvas {
      display: block;
      width: 640px;
      height: 480px;
      image-rendering: pixelated;
    }

    #status-bar {
      margin-top: 12px;
      padding: 8px 20px;
      background: #16213e;
      border-radius: 6px;
      font-size: 13px;
      color: #aaa;
      min-width: 640px;
      text-align: center;
    }

    #status-bar.loading { color: #f0a500; }
    #status-bar.ready   { color: #4ecca3; }
    #status-bar.error   { color: #e94560; }

    #controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 8px 20px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover {
      background: #0f3460;
      border-color: #e94560;
    }

    #output {
      margin-top: 16px;
      width: 640px;
      max-height: 160px;
      overflow-y: auto;
      background: #0d1117;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 10px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      color: #8b949e;
      white-space: pre-wrap;
    }

    footer {
      margin-top: auto;
      padding: 16px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <header>
    <h1>ARES</h1>
    <p>N64 Emulator &mdash; WebAssembly Build</p>
  </header>

  <div id="canvas-container">
    <canvas id="canvas" width="640" height="480" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <div id="status-bar" class="loading">Initializing...</div>

  <div id="controls">
    <label id="btn-load" style="padding:8px 20px;border:1px solid #0f3460;border-radius:6px;background:#16213e;color:#e0e0e0;font-size:14px;cursor:pointer;transition:background 0.2s,border-color 0.2s;">
      Load ROM
      <input type="file" id="rom-input" accept=".z64,.n64,.v64,.rom" style="display:none">
    </label>
    <button id="btn-reset">Reset</button>
    <button id="btn-screenshot">Screenshot</button>
    <button id="btn-fullscreen">Fullscreen</button>
  </div>

  <div style="position:relative;width:640px;">
    <button id="btn-copy" style="position:absolute;top:4px;right:4px;padding:2px 8px;font-size:11px;z-index:1;border:1px solid #0f3460;border-radius:4px;background:#16213e;color:#8b949e;cursor:pointer;">Copy</button>
    <div id="output"></div>
  </div>

  <div id="profile-panel" style="margin-top:12px;width:640px;background:#0d1117;border:1px solid #0f3460;border-radius:6px;padding:10px;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;color:#8b949e;">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span style="color:#4ecca3;font-weight:bold;">Profile (per browser frame avg)</span>
      <button id="btn-copy-profile" style="padding:2px 8px;font-size:11px;border:1px solid #0f3460;border-radius:4px;background:#16213e;color:#8b949e;cursor:pointer;">Copy</button>
    </div>
    <pre id="profile-data" style="margin:0;white-space:pre;">Waiting for data...</pre>
  </div>

  <footer>
    ares &mdash; Multi-System Emulator
  </footer>

  <script>
    const statusBar = document.getElementById('status-bar');
    const output = document.getElementById('output');

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      output.textContent += `[${ts}] ${msg}\n`;
      output.scrollTop = output.scrollHeight;
    }

    function setStatus(text, cls) {
      statusBar.textContent = text;
      statusBar.className = cls || '';
    }

    // Profile display
    var lastProfile = '';
    function updateProfile(p) {
      var lines = [
        'CPU + RSP:      ' + p.cpuRspMs.padStart(8) + ' ms/frame',
        'RDP (angrylion):' + p.rdpMs.padStart(8) + ' ms/frame',
        'WebGPU render:  ' + p.renderMs.padStart(8) + ' ms/frame',
        'Total:          ' + p.totalMs.padStart(8) + ' ms/frame',
        '─────────────────────────────────',
        'MIPS instr/sec: ' + (p.instrPerSec + ' M').padStart(9),
        'N64 FPS:        ' + p.n64Fps.padStart(8),
        'Browser FPS:    ' + p.browserFps.padStart(8),
      ];
      lastProfile = lines.join('\n');
      document.getElementById('profile-data').textContent = lastProfile;
    }

    document.getElementById('btn-copy-profile').addEventListener('click', function() {
      navigator.clipboard.writeText(lastProfile).then(function() {
        document.getElementById('btn-copy-profile').textContent = 'Copied!';
        setTimeout(function() { document.getElementById('btn-copy-profile').textContent = 'Copy'; }, 1000);
      });
    });

    // Emscripten Module configuration
    var Module = {
      canvas: document.getElementById('canvas'),

      print: function(text) {
        log(text);
        console.log(text);
      },

      printErr: function(text) {
        log('[ERR] ' + text);
        console.error(text);
      },

      onRuntimeInitialized: function() {
        log('WASM runtime initialized');
        setStatus('Running', 'ready');
      },

      onAbort: function(what) {
        setStatus('Emulator aborted: ' + what, 'error');
        log('[ABORT] ' + what);
      },

      locateFile: function(path) {
        return path;
      },

      onProfile: updateProfile
    };

    // Fullscreen
    document.getElementById('btn-fullscreen').addEventListener('click', function() {
      const canvas = document.getElementById('canvas');
      if (canvas.requestFullscreen) canvas.requestFullscreen();
      else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen();
      canvas.focus();
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', function() {
      if (Module._resetEmulator) {
        Module._resetEmulator();
        log('Emulator reset');
      }
    });

    // ROM file upload
    document.getElementById('rom-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      log('Loading ROM: ' + file.name + ' (' + file.size + ' bytes)');
      setStatus('Loading ROM...', 'loading');
      var reader = new FileReader();
      reader.onload = function(ev) {
        var data = new Uint8Array(ev.target.result);
        function tryLoad() {
          if (!Module.calledRun) {
            setTimeout(tryLoad, 100);
            return;
          }
          try {
            Module.FS.writeFile('/rom.z64', data);
            Module._loadROM(0, 0);
            log('ROM sent to emulator: ' + file.name);
          } catch(e) {
            log('[ERR] ' + e.message);
          }
        }
        tryLoad();
      };
      reader.readAsArrayBuffer(file);
    });

    // Copy log
    document.getElementById('btn-copy').addEventListener('click', function() {
      navigator.clipboard.writeText(output.textContent).then(function() {
        document.getElementById('btn-copy').textContent = 'Copied!';
        setTimeout(function() { document.getElementById('btn-copy').textContent = 'Copy'; }, 1000);
      });
    });

    // Screenshot — saves with timestamp
    document.getElementById('btn-screenshot').addEventListener('click', function() {
      var canvas = document.getElementById('canvas');
      var now = new Date();
      var ts = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + '_' +
        String(now.getHours()).padStart(2,'0') + '-' +
        String(now.getMinutes()).padStart(2,'0') + '-' +
        String(now.getSeconds()).padStart(2,'0');
      var link = document.createElement('a');
      link.download = 'ares_' + ts + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      log('Screenshot saved: ' + link.download);
    });

    // Keyboard: focus canvas on click
    document.getElementById('canvas').addEventListener('click', function() {
      this.focus();
    });

    setStatus('Loading emulator...', 'loading');
  </script>

  <script>
    // Cache-bust the emscripten JS
    var s = document.createElement('script');
    s.src = 'ares.js?v=' + Date.now();
    s.async = true;
    document.body.appendChild(s);
  </script>

</body>
</html>
